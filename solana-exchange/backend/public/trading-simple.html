<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFD Trading - Solana Exchange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .nav a {
            margin: 0 10px;
            color: #333;
            text-decoration: none;
        }

        .nav a.active {
            color: #667eea;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 15px;
            margin-bottom: 15px;
        }

        /* Chart Section */
        .chart-box {
            background: #1A1C22;
            border-radius: 12px;
            padding: 15px;
        }

        .asset-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .asset-tab {
            padding: 10px 20px;
            background: #2A2C33;
            border: none;
            color: #8E8E93;
            border-radius: 6px;
            cursor: pointer;
        }

        .asset-tab.active {
            background: #F0B90B;
            color: black;
        }

        #chart {
            height: 400px;
            background: #2A2C33;
            border-radius: 8px;
        }

        /* Trading Panel */
        .panel {
            background: #1A1C22;
            border-radius: 12px;
            padding: 20px;
            color: white;
        }

        .balance-card {
            background: #2A2C33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .balance-row .label {
            color: #8E8E93;
        }

        .balance-row .value {
            color: white;
            font-weight: bold;
        }

        .transfer-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .transfer-btn {
            flex: 1;
            padding: 10px;
            background: #F0B90B;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .transfer-btn.secondary {
            background: #4A4F63;
            color: white;
        }

        /* Price Display */
        .price-box {
            background: #2A2C33;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-sell {
            color: #EA3943;
            font-size: 24px;
            font-weight: bold;
        }

        .price-spread {
            color: #F0B90B;
            font-weight: bold;
        }

        .price-buy {
            color: #16C784;
            font-size: 24px;
            font-weight: bold;
        }

        /* Volume */
        .volume-section {
            margin-bottom: 15px;
        }

        .volume-label {
            color: #8E8E93;
            margin-bottom: 8px;
        }

        .volume-buttons {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .volume-btn {
            padding: 10px 5px;
            background: #2A2C33;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .volume-btn.active {
            background: #F0B90B;
            color: black;
        }

        /* Order Summary */
        .summary {
            background: #2A2C33;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #8E8E93;
        }

        .summary-row .value {
            color: white;
            font-weight: bold;
        }

        .summary-row.total {
            border-top: 1px solid #40444F;
            padding-top: 8px;
            margin-top: 8px;
            color: white;
        }

        /* Trade Buttons */
        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .buy-btn {
            padding: 15px;
            background: #16C784;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .sell-btn {
            padding: 15px;
            background: #EA3943;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Positions */
        .positions-section {
            background: #1A1C22;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }

        .positions-section h2 {
            color: white;
            margin-bottom: 15px;
        }

        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .position-card {
            background: #2A2C33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid;
        }

        .position-card.profit {
            border-left-color: #16C784;
        }

        .position-card.loss {
            border-left-color: #EA3943;
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .position-asset {
            font-weight: bold;
            color: white;
        }

        .position-side {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .position-side.BUY {
            background: #16C784;
            color: white;
        }

        .position-side.SELL {
            background: #EA3943;
            color: white;
        }

        .position-details {
            color: #8E8E93;
            font-size: 13px;
        }

        .position-details div {
            margin-bottom: 5px;
        }

        .position-pnl {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }

        .position-pnl.profit {
            color: #16C784;
        }

        .position-pnl.loss {
            color: #EA3943;
        }

        .close-btn {
            width: 100%;
            padding: 8px;
            background: #F0B90B;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1A1C22;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            color: white;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #2A2C33;
            border: 1px solid #40444F;
            border-radius: 6px;
            color: white;
            margin: 10px 0;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .confirm {
            background: #F0B90B;
            color: black;
        }

        .cancel {
            background: #40444F;
            color: white;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s;
        }

        .notification.success {
            background: #16C784;
        }

        .notification.error {
            background: #EA3943;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .volume-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">◎ SolanaX</div>
            <nav class="nav">
                <a href="/">Exchange</a>
                <a href="/trading-simple.html" class="active">Trading</a>
                <a href="/admin-ultimate.html">Admin</a>
            </nav>
            <div class="user-info" onclick="logout()">
                <div class="avatar" id="avatar">U</div>
                <span id="username">Loading...</span>
            </div>
        </header>

        <div class="grid">
            <!-- Chart -->
            <div class="chart-box">
                <div class="asset-tabs" id="assetTabs">
                    <button class="asset-tab" onclick="switchAsset('BTC/USDT')">BTC</button>
                    <button class="asset-tab" onclick="switchAsset('ETH/USDT')">ETH</button>
                    <button class="asset-tab" onclick="switchAsset('ETC/USDT')">ETC</button>
                    <button class="asset-tab active" onclick="switchAsset('SOL/USDT')">SOL</button>
                </div>
                <div id="chart">TradingView Chart Loading...</div>
            </div>

            <!-- Trading Panel -->
            <div class="panel">
                <h2 style="margin-bottom: 15px;">Trade</h2>
                
                <div class="balance-card">
                    <div class="balance-row">
                        <span class="label">Trading Balance:</span>
                        <span class="value" id="tradingBalance">$0.00</span>
                    </div>
                    <div class="balance-row">
                        <span class="label">Main USDC:</span>
                        <span class="value" id="mainUSDC">$0.00</span>
                    </div>
                    <div class="transfer-buttons">
                        <button class="transfer-btn" onclick="showTransferModal('toTrading')">↓ To Trading</button>
                        <button class="transfer-btn secondary" onclick="showTransferModal('toMain')">↑ To Main</button>
                    </div>
                </div>

                <!-- Price Display -->
                <div class="price-box">
                    <div class="price-row">
                        <span class="price-sell" id="bidPrice">$0.00</span>
                        <span class="price-spread" id="spread">0.00</span>
                        <span class="price-buy" id="askPrice">$0.00</span>
                    </div>
                </div>

                <!-- Volume -->
                <div class="volume-section">
                    <div class="volume-label">Volume</div>
                    <div class="volume-buttons">
                        <button class="volume-btn active" onclick="setVolume(0.01)">0.01</button>
                        <button class="volume-btn" onclick="setVolume(0.05)">0.05</button>
                        <button class="volume-btn" onclick="setVolume(0.1)">0.1</button>
                        <button class="volume-btn" onclick="setVolume(0.5)">0.5</button>
                        <button class="volume-btn" onclick="setVolume(1)">1</button>
                        <button class="volume-btn" onclick="setVolume(2)">2</button>
                        <button class="volume-btn" onclick="setVolume(5)">5</button>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="summary">
                    <div class="summary-row">
                        <span>Margin (1:100)</span>
                        <span class="value" id="margin">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Fee ($15/vol)</span>
                        <span class="value" id="fee">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total Required</span>
                        <span class="value" id="total">$0.00</span>
                    </div>
                </div>

                <!-- Trade Buttons -->
                <div class="trade-buttons">
                    <button class="buy-btn" id="buyBtn" onclick="placeOrder('BUY')">BUY</button>
                    <button class="sell-btn" id="sellBtn" onclick="placeOrder('SELL')">SELL</button>
                </div>
            </div>
        </div>

        <!-- Positions -->
        <div class="positions-section">
            <h2>Your Open Positions</h2>
            <div id="positionsList" class="positions-grid">
                <div style="color: #8E8E93; text-align: center; padding: 40px;">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Transfer Modal -->
    <div class="modal" id="transferModal">
        <div class="modal-content">
            <h3 id="modalTitle">Transfer to Trading</h3>
            <input type="number" id="transferAmount" placeholder="Amount USDC" step="0.01">
            <p>Available: <span id="modalAvailable">$0.00</span></p>
            <div class="modal-actions">
                <button class="confirm" onclick="confirmTransfer()">Confirm</button>
                <button class="cancel" onclick="closeTransferModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- TradingView -->
    <script src="https://s3.tradingview.com/tv.js"></script>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONTRACTS = {
            'BTC/USDT': 1,
            'ETH/USDT': 20,
            'ETC/USDT': 1000,
            'SOL/USDT': 100
        };

        // ============================================
        // STATE
        // ============================================
        let currentAsset = 'SOL/USDT';
        let currentVolume = 0.01;
        let currentBid = 82.50;
        let currentAsk = 82.56;
        let currentMid = 82.53;
        let tradingBalance = 0;
        let mainUSDC = 0;
        let positions = [];
        let transferDirection = 'toTrading';

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Check login
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }

            // Get username
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('username').textContent = payload.username || 'User';
                document.getElementById('avatar').textContent = (payload.username || 'U')[0].toUpperCase();
            } catch (e) {}

            // Load data
            await loadBalances();
            await loadPositions();
            await fetchPrices();
            
            // Calculate initial order
            calculateOrder();
            
            // Auto-refresh
            setInterval(fetchPrices, 2000);
            setInterval(loadPositions, 2000);
        });

        // ============================================
        // PRICE FUNCTIONS
        // ============================================
        async function fetchPrices() {
            try {
                const response = await fetch(`/api/trading/prices/${currentAsset}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                
                if (data.success && data.data) {
                    currentBid = data.data.bid || currentBid;
                    currentAsk = data.data.ask || currentAsk;
                    currentMid = data.data.mid || (currentBid + currentAsk) / 2;
                    
                    updatePriceDisplay();
                }
            } catch (error) {
                console.log('Using default prices');
                // Use default prices if API fails
                updatePriceDisplay();
            }
        }

        function updatePriceDisplay() {
            document.getElementById('bidPrice').textContent = `$${currentBid.toFixed(2)}`;
            document.getElementById('askPrice').textContent = `$${currentAsk.toFixed(2)}`;
            
            const spread = (currentAsk - currentBid).toFixed(2);
            document.getElementById('spread').textContent = spread;
            
            calculateOrder();
        }

        // ============================================
        // BALANCE FUNCTIONS
        // ============================================
        async function loadBalances() {
            try {
                const response = await fetch('/api/trading/balance', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    tradingBalance = data.data.tradingUSDC || 0;
                    mainUSDC = data.data.mainUSDC || 0;
                    
                    document.getElementById('tradingBalance').textContent = `$${tradingBalance.toFixed(2)}`;
                    document.getElementById('mainUSDC').textContent = `$${mainUSDC.toFixed(2)}`;
                    document.getElementById('modalAvailable').textContent = `$${mainUSDC.toFixed(2)}`;
                }
            } catch (error) {
                console.error('Balance error:', error);
            }
        }

        // ============================================
        // TRANSFER FUNCTIONS
        // ============================================
        function showTransferModal(direction) {
            transferDirection = direction;
            document.getElementById('modalTitle').textContent = 
                direction === 'toTrading' ? 'Transfer to Trading' : 'Transfer to Main';
            document.getElementById('transferModal').classList.add('active');
        }

        function closeTransferModal() {
            document.getElementById('transferModal').classList.remove('active');
            document.getElementById('transferAmount').value = '';
        }

        async function confirmTransfer() {
            const amount = parseFloat(document.getElementById('transferAmount').value);
            
            if (!amount || amount <= 0) {
                alert('Invalid amount');
                return;
            }
            
            const endpoint = transferDirection === 'toTrading' 
                ? '/api/trading/balance/to-trading' 
                : '/api/trading/balance/to-main';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ amount })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Transfer successful');
                    closeTransferModal();
                    await loadBalances();
                } else {
                    alert(data.error || 'Transfer failed');
                }
            } catch (error) {
                alert('Transfer failed');
            }
        }

        // ============================================
        // VOLUME FUNCTIONS
        // ============================================
        function setVolume(vol) {
            currentVolume = vol;
            document.querySelectorAll('.volume-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseFloat(btn.textContent) === vol) btn.classList.add('active');
            });
            calculateOrder();
        }

        function calculateOrder() {
            const contractSize = CONTRACTS[currentAsset] || 1;
            const positionValue = currentVolume * contractSize * currentMid;
            const margin = positionValue / 100;
            const fee = currentVolume * 15;
            const total = margin + fee;
            
            document.getElementById('margin').textContent = `$${margin.toFixed(2)}`;
            document.getElementById('fee').textContent = `$${fee.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }

        // ============================================
        // ORDER FUNCTIONS
        // ============================================
        async function placeOrder(side) {
            const total = parseFloat(document.getElementById('total').textContent.replace('$', ''));
            
            if (tradingBalance < total) {
                alert(`Need $${total.toFixed(2)} in trading balance`);
                return;
            }
            
            try {
                const response = await fetch('/api/trading/orders/open', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        asset: currentAsset,
                        volume: currentVolume,
                        side
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message);
                    await loadBalances();
                    await loadPositions();
                } else {
                    alert(data.error || 'Order failed');
                }
            } catch (error) {
                alert('Order failed');
            }
        }

        // ============================================
        // POSITION FUNCTIONS
        // ============================================
        async function loadPositions() {
            try {
                const response = await fetch('/api/trading/orders/positions', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                
                if (data.success) {
                    positions = data.data || [];
                    renderPositions();
                }
            } catch (error) {
                console.error('Positions error:', error);
            }
        }

        function renderPositions() {
            const container = document.getElementById('positionsList');
            
            if (positions.length === 0) {
                container.innerHTML = '<div style="color: #8E8E93; text-align: center; padding: 40px;">No open positions</div>';
                return;
            }
            
            container.innerHTML = positions.map(pos => {
                // Calculate P&L based on current price
                const contractSize = CONTRACTS[pos.asset] || 1;
                let priceDiff = currentMid - pos.entry_price;
                if (pos.side === 'SELL') priceDiff = -priceDiff;
                const pnl = priceDiff * pos.volume * contractSize;
                const pnlClass = pnl >= 0 ? 'profit' : 'loss';
                const pnlSymbol = pnl >= 0 ? '+' : '-';
                
                return `
                    <div class="position-card ${pnlClass}">
                        <div class="position-header">
                            <span class="position-asset">${pos.asset}</span>
                            <span class="position-side ${pos.side}">${pos.side}</span>
                        </div>
                        <div class="position-details">
                            <div>Volume: ${pos.volume}</div>
                            <div>Entry: $${pos.entry_price.toFixed(2)}</div>
                            <div>Current: $${currentMid.toFixed(2)}</div>
                        </div>
                        <div class="position-pnl ${pnlClass}">
                            P&L: ${pnlSymbol}$${Math.abs(pnl).toFixed(2)}
                        </div>
                        <button class="close-btn" onclick="closePosition('${pos.id}')">Close</button>
                    </div>
                `;
            }).join('');
        }

        async function closePosition(positionId) {
            if (!confirm('Close this position?')) return;
            
            try {
                const response = await fetch('/api/trading/orders/close', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ positionId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message || 'Position closed');
                    await loadBalances();
                    await loadPositions();
                } else {
                    alert(data.error || 'Failed to close');
                }
            } catch (error) {
                alert('Close failed');
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function switchAsset(asset) {
            currentAsset = asset;
            document.querySelectorAll('.asset-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === asset.split('/')[0]) tab.classList.add('active');
            });
            fetchPrices();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        // Make functions global
        window.switchAsset = switchAsset;
        window.setVolume = setVolume;
        window.placeOrder = placeOrder;
        window.closePosition = closePosition;
        window.showTransferModal = showTransferModal;
        window.closeTransferModal = closeTransferModal;
        window.confirmTransfer = confirmTransfer;
        window.logout = logout;
    </script>
</body>
</html>
