<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Admin - Solana Exchange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .nav-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-left h1 {
            font-size: 24px;
            color: #333;
        }

        .back-btn {
            padding: 8px 16px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: transparent;
            border-radius: 8px;
            color: #666;
            font-size: 16px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #6366f1;
            color: white;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin: 10px 0;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f9fafb;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #666;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        /* Badges */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-admin { background: #6366f1; color: white; }
        .badge-success { background: #10b981; color: white; }
        .badge-warning { background: #f59e0b; color: white; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 2px;
        }

        .btn-primary { background: #6366f1; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <div class="nav-left">
                <a href="/" class="back-btn">← Exchange</a>
                <h1>👑 Ultimate Admin</h1>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('users')">👥 Users</button>
            <button class="tab-btn" onclick="switchTab('withdrawals')">📤 Withdrawals</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
            <button class="tab-btn" onclick="switchTab('logs')">📋 Logs</button>
        </div>

        <!-- Content -->
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Edit</h3>
            <div id="modalContent"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveModal()">Save</button>
                <button class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        let currentAction = null;
        let currentId = null;

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
            
            try {
                if (tab === 'dashboard') await loadDashboard(content);
                if (tab === 'users') await loadUsers(content);
                if (tab === 'withdrawals') await loadWithdrawals(content);
                if (tab === 'settings') await loadSettings(content);
                if (tab === 'logs') await loadLogs(content);
            } catch (error) {
                content.innerHTML = `<div class="card">Error: ${error.message}</div>`;
            }
        }

        async function loadDashboard(container) {
            const res = await fetch('/api/admin/stats', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const s = data.stats || {};

            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div>Total Users</div>
                        <div class="stat-value">${s.total_users || 0}</div>
                        <div>👑 Admins: ${s.total_admins || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div>Total Deposits</div>
                        <div class="stat-value">${s.total_deposits || 0}</div>
                        <div>$${(s.total_deposit_amount || 0).toFixed(2)} volume</div>
                    </div>
                    <div class="stat-card">
                        <div>Pending Withdrawals</div>
                        <div class="stat-value">${s.pending_withdrawals || 0}</div>
                        <div>$${(s.pending_amount || 0).toFixed(2)} pending</div>
                    </div>
                    <div class="stat-card">
                        <div>Total Volume</div>
                        <div class="stat-value">$${(s.total_deposit_amount || 0).toFixed(2)}</div>
                        <div>Fees: $${(s.total_fees_collected || 0).toFixed(2)}</div>
                    </div>
                </div>
            `;
        }

        async function loadUsers(container) {
            const res = await fetch('/api/admin/users', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const users = await res.json();

            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2>User Management</h2>
                        <span>Total: ${users.length}</span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Email</th>
                                <th>SOL</th>
                                <th>USDC</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td>@${user.username}</td>
                                    <td>${user.email}</td>
                                    <td>${(user.sol_balance || 0).toFixed(4)}</td>
                                    <td>${(user.usdc_balance || 0).toFixed(2)}</td>
                                    <td><span class="badge ${user.is_admin ? 'badge-admin' : ''}">${user.is_admin ? 'Admin' : 'User'}</span></td>
                                    <td>
                                        <button class="btn btn-primary btn-sm" onclick="editUser('${user.id}', ${user.sol_balance || 0}, ${user.usdc_balance || 0})">Edit</button>
                                        <button class="btn btn-${user.is_admin ? 'warning' : 'success'} btn-sm" onclick="toggleAdmin('${user.id}', ${user.is_admin})">
                                            ${user.is_admin ? 'Remove' : 'Make'} Admin
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function loadWithdrawals(container) {
            const res = await fetch('/api/admin/withdrawals/pending', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const pending = await res.json();

            container.innerHTML = `
                <div class="card">
                    <h2>Pending Withdrawals (${pending.length})</h2>
                    ${pending.length === 0 ? '<p>No pending withdrawals</p>' : `
                        <table>
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Asset</th>
                                    <th>Amount</th>
                                    <th>Fee</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${pending.map(w => `
                                    <tr>
                                        <td>@${w.username}</td>
                                        <td>${w.asset}</td>
                                        <td>${w.amount}</td>
                                        <td>${w.fee}</td>
                                        <td>
                                            <button class="btn btn-success btn-sm" onclick="processWithdrawal('${w.id}', 'approve')">✓ Approve</button>
                                            <button class="btn btn-danger btn-sm" onclick="processWithdrawal('${w.id}', 'reject')">✗ Reject</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                </div>
            `;
        }

        async function loadSettings(container) {
            const res = await fetch('/api/admin/settings', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const settings = await res.json();

            container.innerHTML = `
                <div class="card">
                    <h2>System Settings</h2>
                    ${settings.map(s => `
                        <div class="form-group">
                            <label>${s.description || s.key}</label>
                            <input type="text" id="set-${s.key}" value="${s.value}">
                            <button class="btn btn-primary btn-sm" onclick="updateSetting('${s.key}')">Update</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadLogs(container) {
            const res = await fetch('/api/admin/logs', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const logs = await res.json();

            container.innerHTML = `
                <div class="card">
                    <h2>Audit Logs</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Admin</th>
                                <th>Action</th>
                                <th>Details</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${logs.map(log => `
                                <tr>
                                    <td>@${log.admin_username}</td>
                                    <td>${log.action}</td>
                                    <td><small>${log.details}</small></td>
                                    <td>${new Date(log.created_at).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function editUser(id, sol, usdc) {
            currentAction = 'user';
            currentId = id;
            document.getElementById('modalTitle').textContent = 'Edit User Balances';
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label>SOL Balance</label>
                    <input type="number" id="editSol" value="${sol}" step="0.0001">
                </div>
                <div class="form-group">
                    <label>USDC Balance</label>
                    <input type="number" id="editUsdc" value="${usdc}" step="0.01">
                </div>
            `;
            document.getElementById('editModal').classList.add('active');
        }

        async function saveModal() {
            if (currentAction === 'user') {
                const sol = document.getElementById('editSol').value;
                const usdc = document.getElementById('editUsdc').value;
                
                await fetch(`/api/admin/users/${currentId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        sol_balance: parseFloat(sol),
                        usdc_balance: parseFloat(usdc)
                    })
                });
            }
            closeModal();
            switchTab('users');
        }

        async function toggleAdmin(id, current) {
            await fetch(`/api/admin/users/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ is_admin: current ? 0 : 1 })
            });
            switchTab('users');
        }

        async function processWithdrawal(id, action) {
            if (!confirm(`${action} this withdrawal?`)) return;
            
            await fetch(`/api/admin/withdrawals/${id}/${action}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            switchTab('withdrawals');
        }

        async function updateSetting(key) {
            const value = document.getElementById(`set-${key}`).value;
            await fetch(`/api/admin/settings/${key}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ value })
            });
            alert('Setting updated');
        }

        // Start with dashboard
        switchTab('dashboard');
    </script>
</body>
</html>
