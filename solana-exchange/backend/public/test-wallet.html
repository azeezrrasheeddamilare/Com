<!DOCTYPE html>
<html>
<head>
    <title>Test Wallet API</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f0f0f0; }
        pre { background: white; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Test Wallet API</h1>
    <button onclick="testAPI()">Test /api/wallet-manager/test</button>
    <button onclick="testInfo()">Test /api/wallet-manager/info</button>
    <pre id="result">Click a button to test</pre>

    <script>
        async function testAPI() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/wallet-manager/test', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }

        async function testInfo() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/wallet-manager/info', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
