<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app"></div>
    <div id="loading" class="loading-spinner"><div class="spinner"></div></div>

    <!-- Load simple non-module version first to test -->
    <script>
        // Simple test to see if JS is loading
        console.log('✅ HTML loaded');
        
        // Fallback if modules fail
        window.onerror = function(msg) {
            document.body.innerHTML += '<div style="color: red; padding: 20px;">Error: ' + msg + '</div>';
        };
    </script>
    
    <!-- Try module version -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
