<!DOCTYPE html>
<html>
<head>
    <title>Clear Cache</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧹 Clear Cache</h1>
        <p>Click below to clear all cached data and reload trading page.</p>
        <button onclick="clearCache()">Clear & Reload Trading</button>
    </div>
    
    <script>
        function clearCache() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '/trading-final.html?t=' + Date.now();
        }
    </script>
</body>
</html>
