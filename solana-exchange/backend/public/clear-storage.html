<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Clear Browser Storage</h2>
        <p>Click below to clear cached data and fix display issues.</p>
        <button onclick="clearStorage()">Clear Storage & Reload</button>
        <button onclick="window.location.href='/trading.html'">Back to Trading</button>
    </div>
    
    <script>
        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            
            // Clear all cookies
            document.cookie.split(";").forEach(c => {
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            
            alert('Storage cleared! Page will reload.');
            window.location.href = '/trading.html';
        }
    </script>
</body>
</html>
